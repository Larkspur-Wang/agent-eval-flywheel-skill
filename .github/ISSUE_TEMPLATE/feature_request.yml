name: Feature request
description: Suggest a new workflow, template, or reference.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What agent-eval workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs.
